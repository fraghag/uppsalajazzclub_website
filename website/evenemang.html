<!DOCTYPE html>

<html class="dark" lang="sv"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Uppsala Jazz Club - Kommande Konserter</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&amp;family=Inter:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="tailwind.config.js"></script>
<style>
        .texture-overlay {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
        }
        /* Hide scrollbar for cleaner look in carousels */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col relative selection:bg-primary-container/30 selection:text-primary-container">
<!-- Global Texture Overlay -->
<div class="fixed inset-0 texture-overlay z-[9999]"></div>
<!-- TopNavBar -->
<div id="header-placeholder"></div>
<main class="flex-grow pt-24">
<section class="px-margin-mobile md:px-margin-desktop py-[80px] max-w-max-width mx-auto">
<div class="flex justify-between items-end mb-12 border-b-4 border-primary-container pb-4">
<h1 class="font-headline-lg text-headline-lg text-primary-container">Kommande Evenemang</h1>
</div>
<div id="events-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-gutter-md">
    <!-- Events dynamically loaded via app.js -->
</div>
</section>

<section id="past-events-section" class="px-margin-mobile md:px-margin-desktop py-[80px] max-w-max-width mx-auto hidden">
<div class="flex justify-between items-end mb-12 border-b-4 border-surface-variant pb-4">
<h2 class="font-headline-lg text-headline-lg text-on-surface-variant">Tidigare Evenemang</h2>
</div>
<div id="past-events-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-gutter-md opacity-80">
    <!-- Past events dynamically loaded via app.js -->
</div>
<div id="load-more-container" class="mt-12 text-center hidden">
    <button id="load-more-btn" class="bg-surface-variant hover:bg-primary-container hover:text-on-primary-container text-on-surface-variant font-label-bold text-label-lg px-8 py-3 rounded-full border-2 border-primary-container transition-all duration-300">
        Visa fler
    </button>
</div>
</section>
</main>
<!-- Footer -->
<div id="footer-placeholder"></div>

<!-- Event Details Modal -->
<div id="event-modal" class="fixed inset-0 z-[10000] hidden flex items-center justify-center p-4 md:p-8">
    <div id="modal-overlay" class="absolute inset-0 bg-background/80 backdrop-blur-sm"></div>
    <div id="modal-content-wrapper" class="bg-surface w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-2xl border-4 border-primary-container relative z-10 shadow-2xl no-scrollbar">
        <button id="close-modal" class="fixed top-8 right-8 z-[10020] bg-background/50 hover:bg-primary-container hover:text-on-primary-container p-2 rounded-full transition-colors duration-200">
            <span class="material-symbols-outlined">close</span>
        </button>
        
        <!-- Sticky Header Image -->
        <div class="sticky top-0 w-full h-64 md:h-96 overflow-hidden z-0">
            <img id="modal-image" src="" alt="" class="w-full h-full object-cover origin-center">
            <div id="modal-image-overlay" class="absolute inset-0 bg-gradient-to-t from-surface to-transparent opacity-60"></div>
        </div>

        <!-- Scrollable Content -->
        <div class="relative z-10 bg-surface p-6 md:p-10 flex flex-col -mt-12 rounded-t-3xl shadow-[0_-20px_40px_rgba(0,0,0,0.3)]">
            <div class="mb-8">
                <span id="modal-location" class="font-label-bold text-label-bold text-primary-container mb-2 block uppercase"></span>
                <h2 id="modal-title" class="font-headline-lg text-headline-lg text-on-background mb-4"></h2>
                <div class="flex flex-wrap items-center gap-x-6 gap-y-2 text-on-surface-variant mb-8 border-b-2 border-surface-variant pb-6">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary-container">calendar_today</span>
                        <span id="modal-date" class="font-label-bold text-label-bold"></span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary-container">schedule</span>
                        <span id="modal-time" class="font-label-bold text-label-bold"></span>
                    </div>
                </div>
                <div id="modal-description" class="font-body-md text-body-lg text-on-surface-variant whitespace-pre-wrap leading-relaxed"></div>
            </div>
            <div class="mt-auto pt-8 flex justify-end items-center">
                <a id="modal-fb-link" href="#" target="_blank" class="bg-primary-container text-on-primary-container px-8 py-3 rounded-full font-label-bold text-label-lg hover:brightness-110 transition-all flex items-center gap-2 shadow-lg">
                    Se på Facebook
                    <span class="material-symbols-outlined text-sm">open_in_new</span>
                </a>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body></html>
